name: Bake screenshots

# Manually-triggered re-bake of every example's reference PNG on the
# same hosts that gate them in CI. Solves the "regenerated locally,
# CI still drifts" problem: dev machines can't match the GitHub
# runner's exact wgpu/Mesa/fontconfig stack, so cross-machine
# rasterizer drift produces sub-perceptual pixel diffs that
# `pixel_threshold(2)` won't absorb. Run this workflow, download the
# artifact, replace the references, commit. Drift only re-appears if
# GHA upgrades the runner image.
#
# The render scale is fixed at `truce_core::screenshot::DEFAULT_SCREENSHOT_SCALE`
# (currently 2.0) regardless of the runner's reported display DPI.
# Tests that opt into a custom scale via `ScreenshotTest::scale` need
# a separate manual bake — `cargo run -p cargo-truce -- screenshot
# --scale <x> --out …` — since this workflow doesn't enumerate per-test
# overrides.

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to bake (any combination of linux,macos,windows)"
        type: string
        default: "linux,macos,windows"
        required: false
  # Run on every PR so reviewers can grab the just-rendered PNGs as
  # an artifact — useful for intentional GUI changes (preview the
  # new look) and for regen after a failing screenshot test (the
  # dev downloads the artifact, replaces the references, commits).
  # The artifact is produced regardless of test pass/fail; gating
  # still happens via `cargo test` in the per-platform CI workflows.
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Keep this list in sync with truce.toml's [[plugin]] entries that
  # have screenshot tests under examples/<crate>/src/lib.rs. The
  # `_linux` / `_macos` / `_windows` suffix on the output filename
  # matches the convention enforced by each example's
  # `gui_screenshot_<os>` test.
  EXAMPLE_CRATES: >-
    truce-example-gain
    truce-example-synth
    truce-example-eq
    truce-example-transpose
    truce-example-gain-egui
    truce-example-arpeggio
    truce-example-gain-iced
    truce-example-gain-slint
    truce-example-tremolo

jobs:
  linux:
    # On `pull_request` (and any other non-dispatch trigger) `inputs`
    # is null, so the platform filter only applies to manual runs.
    if: github.event_name != 'workflow_dispatch' || contains(inputs.platforms, 'linux')
    name: bake (ubuntu-24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2
        with:
          key: bake-ubuntu-24.04

      - name: Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev \
            libgl1-mesa-dev libvulkan-dev mesa-vulkan-drivers \
            libasound2-dev libjack-jackd2-dev \
            libfontconfig1-dev libfreetype-dev

      - name: Build cargo-truce
        run: cargo build -p cargo-truce --release

      - name: Bake screenshots
        run: |
          set -euo pipefail
          for crate in $EXAMPLE_CRATES; do
            short="${crate#truce-example-}"
            short="${short//-/_}"
            out="examples/${crate}/screenshots/${short}_default_linux.png"
            echo "::group::Baking $out"
            ./target/release/cargo-truce screenshot -p "$crate" --out "$out"
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: baked-screenshots-linux
          path: examples/*/screenshots/*_linux.png
          if-no-files-found: error
          retention-days: 30

  macos:
    if: github.event_name != 'workflow_dispatch' || contains(inputs.platforms, 'macos')
    name: bake (macos-14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2
        with:
          key: bake-macos-14

      - name: Build cargo-truce
        run: cargo build -p cargo-truce --release

      - name: Bake screenshots
        run: |
          set -euo pipefail
          for crate in $EXAMPLE_CRATES; do
            short="${crate#truce-example-}"
            short="${short//-/_}"
            out="examples/${crate}/screenshots/${short}_default_macos.png"
            echo "::group::Baking $out"
            ./target/release/cargo-truce screenshot -p "$crate" --out "$out"
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: baked-screenshots-macos
          path: examples/*/screenshots/*_macos.png
          if-no-files-found: error
          retention-days: 30

  windows:
    if: github.event_name != 'workflow_dispatch' || contains(inputs.platforms, 'windows')
    name: bake (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2
        with:
          key: bake-windows-latest

      - name: Build cargo-truce
        run: cargo build -p cargo-truce --release

      - name: Bake screenshots
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $crates = $env:EXAMPLE_CRATES -split '\s+' | Where-Object { $_ }
          foreach ($crate in $crates) {
            $short = ($crate -replace '^truce-example-', '') -replace '-', '_'
            $out = "examples/$crate/screenshots/${short}_default_windows.png"
            Write-Host "::group::Baking $out"
            & ./target/release/cargo-truce.exe screenshot -p $crate --out $out
            if ($LASTEXITCODE -ne 0) { throw "screenshot failed for $crate (exit $LASTEXITCODE)" }
            Write-Host "::endgroup::"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: baked-screenshots-windows
          path: examples/*/screenshots/*_windows.png
          if-no-files-found: error
          retention-days: 30
