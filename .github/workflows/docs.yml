name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTDOCFLAGS: -D warnings

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: cargo doc
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # `cache-bin: false` keeps `~/.cargo/bin/` (the rustup proxies)
      # out of the cache. Caching it bit us with `cargo` resolving
      # to a stale `rustup-init` after restore — see the workflow
      # history if this needs revisiting.
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs-ubuntu-24.04
          cache-bin: false

      - name: Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev \
            libgl1-mesa-dev libegl1-mesa-dev libvulkan-dev mesa-vulkan-drivers \
            libwayland-dev \
            libasound2-dev libjack-jackd2-dev \
            libfontconfig1-dev libfreetype-dev

      - name: cargo doc
        run: cargo doc --workspace --no-deps

      # truce-slint sub-workspace (skia-bindings `links` collision -
      # see crates/truce-slint/Cargo.toml). Render its docs into the
      # same target/doc tree so the published rustdoc still links
      # cross-crate.
      - name: cargo doc (truce-slint sub-workspace)
        run: cargo doc --manifest-path crates/truce-slint/Cargo.toml --workspace --no-deps --target-dir target

      # truce-vizia sub-workspace (vizia's hard-pinned baseview rev +
      # cargo's cross-name `[patch]` rule, see
      # crates/truce-vizia/Cargo.toml). Same target dir for cross-crate
      # linking. `RUSTDOCFLAGS: -D warnings` (workflow-wide) covers
      # rustdoc lints here too.
      - name: cargo doc (truce-vizia sub-workspace)
        run: cargo doc --manifest-path crates/truce-vizia/Cargo.toml --workspace --no-deps --target-dir target

      - name: redirect index.html → truce
        if: github.event_name != 'pull_request'
        run: echo '<meta http-equiv="refresh" content="0; url=truce/">' > target/doc/index.html

      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: target/doc

  deploy:
    name: deploy to Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
