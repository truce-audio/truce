name: iOS

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Pinned iPhone family + iOS runtime so screenshot baselines stay
  # stable across runner-image bumps. The previous auto-discovery
  # logic ("alphabetically latest iPhone Pro on the runner") silently
  # switched device when GHA added a new Pro model (e.g. 16 Pro ->
  # 17 Pro), invalidating every baked iOS PNG. The "Boot iOS
  # Simulator" step below fails loudly if either pin is unavailable
  # on the current runner image, so the next bump becomes a one-line
  # edit to these env values + a re-bake of the iOS screenshot
  # baselines via the `bake-screenshots` workflow.
  #
  # MUST MATCH `bake-screenshots.yml`'s identical block, otherwise
  # bake-and-test drift across workflows.
  IOS_SIM_DEVICE: "com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro"
  IOS_SIM_RUNTIME: "com.apple.CoreSimulator.SimRuntime.iOS-26-2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macos-latest → iOS (device + sim)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # iOS device + simulator slices have distinct Mach-O platform
      # IDs and can't share a target dir cache key, but installing
      # both rustup targets is cheap. The simulator triple uses the
      # `-sim` suffix; the device triple is the plain Apple iOS.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-latest-ios
          cache-bin: false

      # Plugin authors target iOS through `cargo truce install --ios`
      # (simulator) or `cargo truce install --ios-device`. CI exercises
      # the framework-build half of the pipeline for both slices —
      # signing + installation needs an Apple Developer team ID and a
      # paired device / booted simulator, both of which need extra
      # secret wiring to add to CI. Catching the build-side regressions
      # (FFI mismatches, feature-flag drift, swiftc bridging-header
      # rot) is the high-value coverage here.
      #
      # The simulator build batches every plugin the screenshot loop
      # below exercises into a single cargo invocation so shared deps
      # (truce-core, wgpu, baseview, ...) compile once across the
      # workspace. Each per-crate `cargo build` inside the loop's
      # `install_one_screenshot` then resolves to a fingerprint-only
      # no-op. The single `-p truce-example-gain` shape is preserved
      # for the device slice where only the framework-build smoke is
      # exercised.
      - name: Build framework dylib (simulator slice, all screenshot plugins)
        run: |
          cargo build \
            -p truce-example-gain \
            -p truce-example-synth \
            -p truce-example-eq \
            -p truce-example-gain-egui \
            -p truce-example-arpeggio \
            -p truce-example-gain-slint \
            -p truce-example-tremolo \
            -p truce-example-state \
            -p truce-example-fundsp-reverb-worker \
            -p truce-example-fundsp-reverb-simple \
            -p truce-example-transpose \
            --target aarch64-apple-ios-sim \
            --release --no-default-features --features au

      - name: Build framework dylib (device slice)
        run: |
          cargo build -p truce-example-gain \
            --target aarch64-apple-ios \
            --release --no-default-features --features au

      - name: Verify iOS dylibs are valid Mach-O for their platform
        run: |
          set -e
          DEV=target/aarch64-apple-ios/release/libtruce_example_gain.dylib
          SIM=target/aarch64-apple-ios-sim/release/libtruce_example_gain.dylib
          test -f "$DEV"
          test -f "$SIM"
          # Verify each slice carries the right platform load
          # command. The simulator slice always uses the unified
          # `LC_BUILD_VERSION` form (`platform 7` = iPhoneSimulator);
          # the device slice depends on the deployment-target version:
          # older iOS targets emit the legacy `LC_VERSION_MIN_IPHONEOS`
          # load command, newer ones emit `LC_BUILD_VERSION`
          # `platform 2` = iPhoneOS. Accept either form for the
          # device slice; reject any form of iPhoneSimulator on it.
          # Accidentally building the simulator slice against the
          # device SDK would otherwise silently produce a dylib that
          # fails to load on the simulator at runtime.
          if otool -l "$DEV" | grep -q "LC_VERSION_MIN_IPHONEOS"; then
            echo "DEV: legacy LC_VERSION_MIN_IPHONEOS — OK"
          else
            otool -l "$DEV" | grep -A2 LC_BUILD_VERSION | grep "platform 2"
            echo "DEV: LC_BUILD_VERSION platform 2 — OK"
          fi
          if otool -l "$DEV" | grep -A2 LC_BUILD_VERSION | grep -q "platform 7"; then
            echo "ERROR: DEV dylib carries iPhoneSimulator platform 7"
            exit 1
          fi
          otool -l "$SIM" | grep -A2 LC_BUILD_VERSION | grep "platform 7"
          echo "SIM: LC_BUILD_VERSION platform 7 — OK"

      # Boot the simulator pinned to `IOS_SIM_DEVICE` /
      # `IOS_SIM_RUNTIME` (see workflow-level `env:` block). The
      # script fails loudly with the runner's currently-available
      # IDs if either pin has been retired — that's the signal to
      # bump the env values and re-bake the iOS screenshot baselines.
      - name: Boot iOS Simulator
        run: python3 scripts/ci/boot-ios-simulator.py truce-ci

      # `cargo build --workspace` isn't part of this job (it would
      # also recompile every example crate against the host triple
      # for no benefit — the iOS slices above are what we actually
      # need built). The install / screenshot steps below run
      # `./target/debug/cargo-truce` directly though, so build just
      # that binary for the host.
      - name: Build cargo-truce for host
        run: cargo build -p cargo-truce

      - name: Install plugin on simulator
        run: |
          ./target/debug/cargo-truce install --ios -p truce-example-gain

      # iOS screenshot regression. The desktop screenshot path
      # (dlopen of the cdylib) can't see iOS-specific compositing
      # like the BuiltinEditor's CGImage blit. `--ios` captures the
      # simulator's actual rendered output via simctl io screenshot.
      # `--check` diffs the captured PNG against the committed
      # baseline at `examples/truce-example-gain/screenshots/`; CI
      # fails non-zero on regression. Re-bake via the
      # `.github/workflows/bake-screenshots.yml` workflow's `ios`
      # job — runs on every PR and on manual dispatch, uploads the
      # full set of `_default_ios` + `_container_ios` PNGs as the
      # `baked-screenshots-ios` artifact.
      - name: iOS screenshot smoke (gain default)
        id: ios_smoke
        run: |
          ./target/debug/cargo-truce screenshot --ios --check \
            --out examples/truce-example-gain/screenshots/gain_default_ios.png \
            -p truce-example-gain

      # Run `--check` against every committed container-mode
      # baseline and accumulate failures across the whole loop
      # before exiting non-zero. Reviewers see the full per-example
      # diff list rather than the first failure short-circuiting
      # the run; the final `exit $fail` is what gates CI. Re-bake
      # via the `bake-screenshots.yml` workflow's `ios` job
      # (`baked-screenshots-ios` artifact on every PR + manual
      # dispatch).
      #
      # `truce-example-gain-iced` is skipped: iced's iOS backend is
      # broken upstream and its container app never wires the editor.
      # `cargo truce screenshot --ios` writes a single-orientation
      # `UISupportedInterfaceOrientations` into the temporary
      # container's Info.plist (the plugin's first listed
      # orientation, defaulting to portrait), which forces iOS to
      # rotate the sim to that orientation when the container
      # launches. The loop order therefore doesn't influence the
      # captured dimensions — kept transpose last anyway as a
      # secondary safeguard in case the lock ever regresses.
      - name: iOS container screenshots (diff vs baselines)
        id: ios_diff
        run: |
          set +e
          fail=0
          # Restart the simulator between plugins to clear accumulated
          # AUExt processes + componentd lookup state + Metal contexts.
          # Without this, plugins partway through the sequence (tremolo,
          # arpeggio) timeout waiting for first paint.
          for crate in \
              truce-example-gain \
              truce-example-synth \
              truce-example-eq \
              truce-example-gain-egui \
              truce-example-arpeggio \
              truce-example-gain-slint \
              truce-example-tremolo \
              truce-example-state \
              truce-example-fundsp-reverb-worker \
              truce-example-fundsp-reverb-simple \
              truce-example-transpose \
              truce-example-gui-zoo; do
            short=${crate#truce-example-}
            short_under=${short//-/_}
            echo "=== $crate ==="
            xcrun simctl shutdown truce-ci 2>/dev/null || true
            xcrun simctl boot truce-ci
            xcrun simctl bootstatus truce-ci
            ./target/debug/cargo-truce screenshot --ios \
              --crop-mode container \
              --check \
              --out "examples/$crate/screenshots/${short_under}_container_ios.png" \
              -p "$crate" || fail=$((fail + 1))
          done
          echo "container-mode regressions: $fail / 12"
          exit $fail

      # `--check` writes each freshly-rendered PNG to
      # `target/screenshots/` regardless of whether the diff passed.
      # On failure, surface them as an artifact so reviewers can grab
      # the actual capture, eyeball the diff, and `cp` it over the
      # baseline if the change was intentional. `if: failure()` keeps
      # successful runs from uploading 11 redundant PNGs.
      - name: Upload rendered screenshots (on failure)
        if: failure() && (steps.ios_diff.outcome == 'failure' || steps.ios_smoke.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: ios-failed-screenshots
          path: target/screenshots/*_ios.png
          if-no-files-found: ignore
          retention-days: 14

      # The Swift templates that `cargo truce install --ios` feeds to
      # swiftc live alongside the Rust code. A drift between the
      # bridging header and the C ABI (AuMidiEvent, AuMidi2Event,
      # AuCallbacks::process signature) is invisible to `cargo
      # check`. Smoke-compile the appex template against the
      # simulator SDK so CI catches the drift.
      - name: Swiftc smoke build (simulator AUExt)
        run: |
          set -e -o pipefail
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          STAGE=$(mktemp -d)
          cp crates/cargo-truce/templates/au3/AudioUnitFactory.swift "$STAGE/"
          cp crates/cargo-truce/templates/au3/BridgingHeader.h "$STAGE/"
          # Stub external Rust globals — swiftc requires the symbols
          # to resolve to compile -emit-executable. The actual
          # appex links against the framework's exports; the smoke
          # build just needs to parse + type-check the template.
          cat > "$STAGE/stubs.c" <<'EOF'
          #include "../../../crates/truce-shim-types/include/au_shim_types.h"
          const AuPluginDescriptor *g_descriptor = (void *)0;
          const AuCallbacks *g_callbacks = (void *)0;
          const AuParamDescriptor *g_param_descriptors = (void *)0;
          uint32_t g_num_params = 0;
          void truce_au_init(void) {}
          EOF
          xcrun -sdk iphonesimulator swiftc \
            -target arm64-apple-ios16.0-simulator \
            -sdk "$SDK_PATH" \
            -module-name AUExt \
            -typecheck \
            -import-objc-header "$STAGE/BridgingHeader.h" \
            -Xcc "-I$PWD/crates/truce-shim-types/include" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xcc -target -Xcc arm64-apple-ios16.0-simulator \
            "$STAGE/AudioUnitFactory.swift"
