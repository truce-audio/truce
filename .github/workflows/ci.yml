name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Disable incremental — saves cache size + speeds clean builds. The
# clippy step uses `-D warnings` to fail fast on stray rustc /
# clippy lints.
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

# Cancel in-progress runs when a PR is updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    # Pin CI to the declared MSRV (`rust-version` in Cargo.toml). When
    # bumping MSRV, update both places. Stable-track regressions are
    # acceptable trade for honest MSRV enforcement; the CI cache wipes
    # on bump.
    name: ${{ matrix.os }} (1.88)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy

      # Smart cache that knows about target/ layout, lockfile, toolchain.
      # Saves ~5-10 min cold → warm on every job.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      # Linux audio + windowing system deps. List mirrors the apt block
      # in `truce-docs/docs/internal/linux.md` (kept in sync there).
      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev \
            libgl1-mesa-dev libvulkan-dev mesa-vulkan-drivers \
            libasound2-dev libjack-jackd2-dev \
            libfontconfig1-dev libfreetype-dev

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets

      - name: test
        run: cargo test --workspace
