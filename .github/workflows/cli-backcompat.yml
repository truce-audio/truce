name: scaffold backwards-compat

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Asks one question, on each scaffold shape: would a plugin
# scaffolded by the LAST released `cargo-truce` still compile against
# THIS commit of truce?
#
# Catches accidental breakage in the public surface that older
# scaffold-templated plugins lean on (renamed prelude items, dropped
# re-exports, derive-macro signature shifts).
#
# v1 scope: Linux only, against the latest git tag. Three shapes
# (effect, instrument, workspace-mixed) run as parallel matrix jobs
# so a regression in one template doesn't mask the others. Tag
# resolution runs once in a setup job and feeds the matrix.
# Linux is cheaper / faster than macOS for the pure-Rust `cargo
# check` we run; format-specific install/package coverage stays on
# the platform-specific workflows.

# `cargo install` of the released cargo-truce takes ~1 min on a
# fresh runner; we cache it by tag and reuse across the three
# matrix shapes. The setup job resolves the tag and primes the
# cache. The matrix jobs use `actions/cache/restore` (read-only)
# and fall back to installing themselves on miss - the first run
# of a new tag races cache upload against matrix-job dispatch and
# can land on a cache miss, so the matrix must be self-sufficient.
jobs:
  setup:
    name: resolve last release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.latest.outputs.tag }}
    steps:
      - uses: dtolnay/rust-toolchain@stable

      # Latest non-prerelease tag on the truce repo, e.g. `v0.43.0`.
      # Sort by semver-ish descending; pick the first plain
      # `vN.M.P` (skip alpha/beta/rc).
      - name: Resolve latest released tag
        id: latest
        shell: bash
        run: |
          tag=$(git ls-remote --tags --sort='-v:refname' \
                  https://github.com/truce-audio/truce \
                  | grep -oE 'refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$' \
                  | head -1 \
                  | sed 's|refs/tags/||')
          if [ -z "$tag" ]; then
            echo "::error::No released tags found on truce-audio/truce"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Latest released tag: $tag"

      - name: Cache released cargo-truce
        id: cache-old-cargo-truce
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/old-cargo-truce
          key: old-cargo-truce-${{ steps.latest.outputs.tag }}-ubuntu

      - name: Install released cargo-truce
        if: steps.cache-old-cargo-truce.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cargo install --git https://github.com/truce-audio/truce \
                        --tag "${{ steps.latest.outputs.tag }}" \
                        cargo-truce \
                        --root "$RUNNER_TEMP/old-cargo-truce"

  backcompat:
    needs: setup
    name: ${{ matrix.shape.id }} (scaffold w/ ${{ needs.setup.outputs.tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shape:
          - id: effect
            new_args: "probe-fx --vendor Probe --vendor-id com.probe.test"
            project_dir: probe-fx
          - id: instrument
            new_args: "probe-synth --instrument --vendor Probe --vendor-id com.probe.test"
            project_dir: probe-synth
          - id: workspace-mixed
            new_args: "probe --workspace fx synth midi --type:synth=instrument --type:midi=midi --vendor Probe --vendor-id com.probe.test"
            project_dir: probe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-backcompat-${{ matrix.shape.id }}
          cache-bin: false

      # Same Linux dep set the other CI workflows install. The
      # scaffolded plugin pulls truce-standalone (cpal → alsa-sys
      # needs libasound2-dev), truce-gui (X11 / wayland / fontconfig),
      # and wgpu (Mesa / Vulkan). Without these, `cargo check` fails
      # in alsa-sys's build script before reaching any Rust code.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev \
            libgl1-mesa-dev libvulkan-dev mesa-vulkan-drivers \
            libasound2-dev libjack-jackd2-dev \
            libfontconfig1-dev libfreetype-dev

      # Restore the cargo-truce binary the setup job primed. On a
      # cache miss (new tag, cache propagation lag), the next step
      # installs the binary directly so this matrix is self-sufficient.
      - name: Restore released cargo-truce from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/old-cargo-truce
          key: old-cargo-truce-${{ needs.setup.outputs.tag }}-ubuntu

      - name: Install released cargo-truce (cache-miss fallback)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cargo install --git https://github.com/truce-audio/truce \
                        --tag "${{ needs.setup.outputs.tag }}" \
                        cargo-truce \
                        --root "$RUNNER_TEMP/old-cargo-truce"

      - name: Show released cargo-truce version
        shell: bash
        run: |
          "$RUNNER_TEMP/old-cargo-truce/bin/cargo-truce" --version || \
          "$RUNNER_TEMP/old-cargo-truce/bin/cargo-truce" -h | head -1

      - name: Scaffold (${{ matrix.shape.id }})
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/scaffold"
          cd "$RUNNER_TEMP/scaffold"
          "$RUNNER_TEMP/old-cargo-truce/bin/cargo-truce" new ${{ matrix.shape.new_args }}
          ls -la "${{ matrix.shape.project_dir }}/"

      # Rewrite scaffolded `{ git = ".../truce", tag = "..." }` deps
      # to `{ path = "<workspace>/crates/<name>" }` so the older
      # scaffold consumes THIS commit of truce instead of the
      # published tag it was generated against. Shared with
      # `cli-scaffold.yml`.
      - name: Rewrite git deps to local truce HEAD
        env:
          SCAFFOLD_DIR: ${{ runner.temp }}/scaffold/${{ matrix.shape.project_dir }}
        run: python3 scripts/ci/rewrite-scaffold-deps.py

      # `cargo check` (not `build`) is enough for the contract this
      # workflow guards: catches removed / renamed public items the
      # scaffold template uses. Build / link is downstream and out of
      # scope for backwards-compat (the install + package CI in
      # `cli-install.yml` already exercises those against current
      # templates).
      - name: cargo check against truce HEAD
        shell: bash
        working-directory: ${{ runner.temp }}/scaffold/${{ matrix.shape.project_dir }}
        run: cargo check --all-targets
