name: Linux

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Trim debug info in CI to keep target/ off the runner's disk ceiling.
  # The fat `.a`/`.rlib` artifacts that blew past "No space left on device"
  # were mostly DWARF; `line-tables-only` keeps file/line numbers in
  # backtraces while dropping the bulk. CI-only — local dev keeps full
  # symbols (no Cargo.toml change). The test profile inherits dev, but its
  # `debug` key must be set explicitly to override.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo fmt --all --manifest-path crates/truce-slint/Cargo.toml -- --check
      - run: cargo fmt --all --manifest-path crates/truce-vizia/Cargo.toml -- --check

  test:
    name: ubuntu-24.04 (stable)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # `cache-bin: false` keeps `~/.cargo/bin/` (the rustup proxies)
      # out of the cache. Caching it bit us with `cargo` resolving
      # to a stale `rustup-init` after restore — see the workflow
      # history if this needs revisiting.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-24.04
          cache-bin: false

      - name: Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev \
            libgl1-mesa-dev libegl1-mesa-dev libvulkan-dev mesa-vulkan-drivers \
            libwayland-dev \
            libasound2-dev libjack-jackd2-dev \
            libfontconfig1-dev libfreetype-dev \
            alsa-utils

      - name: Point ALSA default PCM at the null device
        run: |
          sudo tee /etc/asound.conf >/dev/null <<'EOF'
          pcm.!default { type null }
          ctl.!default { type null }
          EOF
          aplay -L | head -4

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets

      - name: test
        run: cargo test --workspace -- --skip gui_screenshot

      # Screenshot tests render through truce-gui, whose backend is
      # feature-selected (`cpu` default / `gpu` opt-in). A single
      # `cargo test --workspace` unifies features across the graph, so
      # truce-example-eq's `gpu` opt-in would flip every cpu example
      # onto the GpuEditor and break the cpu reference PNGs. Run them
      # split by renderer instead — each invocation builds truce-gui
      # with one backend, matching how the baselines are baked
      # (`cargo truce screenshot -p <crate>`, per-crate). eq is the only
      # crate enabling `truce-gui/gpu`, so excluding it yields a
      # cpu-only build for everything else.
      - name: screenshot tests (cpu)
        run: cargo test --workspace --exclude truce-example-eq -- gui_screenshot
      - name: screenshot tests (gpu)
        run: cargo test -p truce-example-eq -- gui_screenshot

      # truce-slint and truce-vizia each live in their own Cargo
      # sub-workspace (see their respective `crates/<name>/Cargo.toml`
      # headers for the rationale - skia-bindings `links` collision
      # for slint, vizia's hard-pinned baseview rev for vizia). The
      # parent `--workspace` doesn't reach into either, so mirror the
      # gates here against each sub-workspace's own manifest.
      - name: clippy (truce-slint sub-workspace)
        run: cargo clippy --manifest-path crates/truce-slint/Cargo.toml --workspace --all-targets -- -D warnings
      - name: build (truce-slint sub-workspace)
        run: cargo build --manifest-path crates/truce-slint/Cargo.toml --workspace --all-targets
      - name: test (truce-slint sub-workspace)
        run: cargo test --manifest-path crates/truce-slint/Cargo.toml --workspace -- --skip gui_screenshot
      - name: screenshot tests (truce-slint sub-workspace)
        run: cargo test --manifest-path crates/truce-slint/Cargo.toml --workspace -- gui_screenshot
      - name: clippy (truce-vizia sub-workspace)
        run: cargo clippy --manifest-path crates/truce-vizia/Cargo.toml --workspace --all-targets -- -D warnings
      - name: build (truce-vizia sub-workspace)
        run: cargo build --manifest-path crates/truce-vizia/Cargo.toml --workspace --all-targets
      - name: test (truce-vizia sub-workspace)
        run: cargo test --manifest-path crates/truce-vizia/Cargo.toml --workspace -- --skip gui_screenshot
      - name: screenshot tests (truce-vizia sub-workspace)
        run: cargo test --manifest-path crates/truce-vizia/Cargo.toml --workspace -- gui_screenshot

      # Ratio-based regression guard: gain_simd_fast must run at
      # least 5x faster than the naive gain shape on the same
      # runner. Same-runner ratios cancel most of CI's timing
      # noise. Local measurement is ~22x; threshold of 5x leaves
      # generous headroom for slow runners while still catching
      # real regressions in is_smoothing / chunks_mut / gain_block.
      - name: perf regression (gain vs gain-simd)
        run: cargo test --release -p truce-simd --test gain_perf_regression -- --ignored --nocapture

      # ─────────────────────────────────────────────────────────────────
      # CLAP + VST3 validation against industry validators.
      # `validate --clap --pluginval` exits non-zero on any FAIL; the
      # tail grep also fails the step if any plugin was SKIP'd
      # (validator binary missing or bundle not installed).
      # ─────────────────────────────────────────────────────────────────
      - name: Cache pluginval
        id: cache-pluginval
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/pluginval
          key: pluginval-linux-1.0.4

      - name: Download pluginval
        if: steps.cache-pluginval.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL -o /tmp/pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Linux.zip
          unzip -oq /tmp/pluginval.zip -d /tmp/pluginval-bin
          install -m 755 /tmp/pluginval-bin/pluginval ~/.local/bin/pluginval

      - name: Cache clap-validator
        id: cache-clap-validator
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/clap-validator
          key: clap-validator-linux-2026-05-09

      - name: Install clap-validator
        if: steps.cache-clap-validator.outputs.cache-hit != 'true'
        run: cargo install --locked --git https://github.com/free-audio/clap-validator clap-validator

      - name: Validators on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Pre-flight — validators present
        run: |
          command -v clap-validator
          command -v pluginval

      - name: Install plugin (CLAP + VST3)
        # Release profile: pluginval's process-without-setActive paths trip
        # a debug_assert in `truce-vst3::cb_process` (separate bug); release
        # also matches what users actually ship.
        run: ./target/debug/cargo-truce install --user --clap --vst3 -p truce-example-gain

      - name: Validate CLAP + VST3
        run: |
          set -e -o pipefail
          xvfb-run -a ./target/debug/cargo-truce validate --clap --pluginval -p truce-example-gain 2>&1 | tee validate.log
          if grep -E "SKIP|not found" validate.log >/dev/null; then
            echo "::error::validate skipped a step — failing"
            exit 1
          fi

      - name: upload failing screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failing-screenshots-linux
          path: target/screenshots/
          if-no-files-found: ignore
          retention-days: 14

  # Sub-workspace install + validate + package round-trip for slint
  # and vizia. Split out from `test` because:
  #   - skia-bindings + vizia compile times push the job toward the
  #     30-minute GHA soft cap; failures here shouldn't block the fast
  #     gate;
  #   - vizia's editor needs a real Xorg + Mesa GLX stack (xvfb's
  #     built-in GLX module advertises no FBConfigs), which is
  #     heavyweight runner setup the rest of `test` shouldn't pay for.
  # Mirrors the macOS `gui-window` and bake-screenshots split: each
  # gets its own runner, its own apt install, and its own validator
  # cache key.
  sub-workspaces:
    name: ubuntu-24.04 (sub-workspaces)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-24.04-sub-workspaces
          cache-bin: false

      - name: Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev \
            libgl1-mesa-dev libegl1-mesa-dev libvulkan-dev mesa-vulkan-drivers \
            libgl1-mesa-dri libglx-mesa0 mesa-utils \
            xserver-xorg-core xserver-xorg-video-dummy x11-utils \
            libwayland-dev \
            libasound2-dev libjack-jackd2-dev \
            libfontconfig1-dev libfreetype-dev \
            xvfb

      - name: Cache pluginval
        id: cache-pluginval
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/pluginval
          key: pluginval-linux-1.0.4

      - name: Download pluginval
        if: steps.cache-pluginval.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL -o /tmp/pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Linux.zip
          unzip -oq /tmp/pluginval.zip -d /tmp/pluginval-bin
          install -m 755 /tmp/pluginval-bin/pluginval ~/.local/bin/pluginval

      - name: Cache clap-validator
        id: cache-clap-validator
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/clap-validator
          key: clap-validator-linux-2026-05-09

      - name: Install clap-validator
        if: steps.cache-clap-validator.outputs.cache-hit != 'true'
        run: cargo install --locked --git https://github.com/free-audio/clap-validator clap-validator

      - name: Validators on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Pre-flight — validators present
        run: |
          command -v clap-validator
          command -v pluginval

      - name: Build cargo-truce
        run: cargo build -p cargo-truce

      # truce-slint's editor renders through CPU-backed Skia and
      # doesn't open a GL context - `xvfb-run` is enough.
      - name: Install + validate (truce-slint sub-workspace)
        run: |
          set -e -o pipefail
          cd crates/truce-slint
          "$GITHUB_WORKSPACE/target/debug/cargo-truce" install --user --clap --vst3 -p truce-example-gain-slint
          xvfb-run -a "$GITHUB_WORKSPACE/target/debug/cargo-truce" validate --clap --pluginval -p truce-example-gain-slint 2>&1 | tee validate-slint.log
          if grep -E "SKIP|not found" validate-slint.log >/dev/null; then
            echo "::error::slint validate skipped a step — failing"
            exit 1
          fi

      # vizia's editor opens a GLX-backed OpenGL surface through
      # baseview's X11 GL path. pluginval's "Open editor whilst
      # processing" probe instantiates the editor for real, and
      # `xvfb`'s built-in GLX module on Ubuntu 24.04 can't advertise
      # any FBConfigs - baseview's `glXChooseFBConfig` returns
      # `NoValidFBConfig` and the editor probe panics. Spin a real
      # Xorg server with the `dummy` video driver instead: that
      # gives us Mesa's full GLX implementation routed to llvmpipe
      # (software rasteriser) by `LIBGL_ALWAYS_SOFTWARE=1`.
      - name: Start headless Xorg (dummy driver) for vizia validate
        run: |
          set -e
          sudo tee /tmp/xorg-dummy.conf >/dev/null <<'EOF'
          Section "Monitor"
            Identifier "dummy"
            HorizSync   28.0-80.0
            VertRefresh 48.0-75.0
          EndSection
          Section "Device"
            Identifier "dummy"
            Driver "dummy"
            VideoRam 256000
          EndSection
          Section "Screen"
            Identifier "screen"
            Monitor "dummy"
            Device "dummy"
            DefaultDepth 24
            SubSection "Display"
              Depth 24
              Modes "1920x1080"
              Virtual 1920 1080
            EndSubSection
          EndSection
          EOF
          # Allow non-console users to start Xorg (the GHA runner
          # user isn't on a tty). Ubuntu 24.04's Xwrapper defaults
          # block both predicates - relax both for this job.
          sudo tee /etc/X11/Xwrapper.config >/dev/null <<'EOF'
          allowed_users=anybody
          needs_root_rights=yes
          EOF
          # `-noreset` keeps the server up if any client disconnects.
          # `-logfile` keeps the per-session log out of /var/log
          # (which the runner user can't write to).
          sudo Xorg -noreset \
            +extension GLX +extension RANDR +extension RENDER \
            -config /tmp/xorg-dummy.conf \
            -logfile /tmp/xorg-dummy.log \
            :99 &
          # Wait for X to be ready - `xdpyinfo` exits 0 once the
          # server is accepting connections.
          for _ in $(seq 1 30); do
            DISPLAY=:99 xdpyinfo >/dev/null 2>&1 && break
            sleep 0.2
          done
          if ! DISPLAY=:99 xdpyinfo >/dev/null 2>&1; then
            echo "::error::Xorg :99 never became ready"
            echo "--- Xorg log tail ---"
            sudo tail -100 /tmp/xorg-dummy.log || true
            exit 1
          fi
          # Sanity-check: enumerate FBConfigs. If `glxinfo` can find
          # them here, baseview's `glXChooseFBConfig` will too. If it
          # can't, surface the diagnostic *now* with the Xorg log
          # rather than letting the validate step panic with a
          # less-actionable backtrace deep in baseview.
          export DISPLAY=:99
          export LIBGL_ALWAYS_SOFTWARE=1
          export __GLX_VENDOR_LIBRARY_NAME=mesa
          echo "--- glxinfo -B ---"
          glxinfo -B || true
          # glxinfo's exit code lies on Xvfb / dummy-driver setups:
          # it can print a GL renderer string while
          # `glXChooseFBConfig` still returns zero configs (different
          # code path in libglvnd). Mirror baseview's actual call so
          # the gate fails for the same reason baseview would, with
          # diagnostics in hand instead of a panic in the validator.
          # Smoke mirrors baseview-truce-vizia's exact FBConfig
          # attribute list (see baseview/src/wrappers/glx.rs
          # `get_fb_attribs`) - including
          # `GLX_FRAMEBUFFER_SRGB_CAPABLE_ARB = 1` from vizia's
          # `GlConfig::default()`. Different attribute sets get
          # different FBConfig matches, so a generic smoke could pass
          # while baseview's call still fails.
          cat > /tmp/glx_smoke.c <<'EOF'
          #include <GL/glx.h>
          #include <X11/Xlib.h>
          #include <stdio.h>
          #ifndef GLX_FRAMEBUFFER_SRGB_CAPABLE_ARB
          #define GLX_FRAMEBUFFER_SRGB_CAPABLE_ARB 0x20B2
          #endif
          int main(void) {
              Display *d = XOpenDisplay(NULL);
              if (!d) { fprintf(stderr, "XOpenDisplay failed\n"); return 1; }
              int attrs[] = {
                  GLX_X_RENDERABLE, 1,
                  GLX_X_VISUAL_TYPE, GLX_TRUE_COLOR,
                  GLX_DRAWABLE_TYPE, GLX_WINDOW_BIT,
                  GLX_RENDER_TYPE, GLX_RGBA_BIT,
                  GLX_RED_SIZE, 8, GLX_GREEN_SIZE, 8, GLX_BLUE_SIZE, 8, GLX_ALPHA_SIZE, 8,
                  GLX_DEPTH_SIZE, 24, GLX_STENCIL_SIZE, 8,
                  GLX_DOUBLEBUFFER, 1,
                  GLX_FRAMEBUFFER_SRGB_CAPABLE_ARB, 1,
                  0
              };
              int n = 0;
              GLXFBConfig *cfg = glXChooseFBConfig(d, DefaultScreen(d), attrs, &n);
              fprintf(stderr, "glXChooseFBConfig (sRGB) returned %d FBConfig(s)\n", n);
              if (cfg) XFree(cfg);
              if (n > 0) return 0;
              // Re-probe without sRGB so we can tell *which* attribute
              // is the blocker - llvmpipe via the dummy driver is the
              // most common culprit for missing sRGB-capable visuals.
              attrs[24] = 0;  // clobber the sRGB pair, leaving only the rest
              cfg = glXChooseFBConfig(d, DefaultScreen(d), attrs, &n);
              fprintf(stderr, "glXChooseFBConfig (no sRGB) returned %d FBConfig(s)\n", n);
              if (cfg) XFree(cfg);
              return (n > 0) ? 3 : 2;
          }
          EOF
          cc -o /tmp/glx_smoke /tmp/glx_smoke.c -lGL -lX11
          set +e
          /tmp/glx_smoke; smoke_rc=$?
          set -e
          if [ "$smoke_rc" -eq 3 ]; then
            echo "::error::FBConfigs exist but none are sRGB-capable; baseview's GlConfig::default() {srgb:true} can't match"
            echo "This is the root cause of the pluginval editor panic."
          elif [ "$smoke_rc" -ne 0 ]; then
            echo "::error::glXChooseFBConfig found zero FBConfigs even without sRGB - baseview will panic the same way"
          fi
          if [ "$smoke_rc" -ne 0 ]; then
            echo "--- vendor JSON files ---"
            ls -la /usr/share/glvnd/egl_vendor.d/ /usr/lib/x86_64-linux-gnu/GL/glx/*.json 2>/dev/null || true
            echo "--- Mesa GLX provider ---"
            find /usr/lib/x86_64-linux-gnu -name 'libGLX_mesa*' -o -name 'libglx*' 2>/dev/null
            echo "--- Xorg-loaded modules (from log) ---"
            sudo grep -E "(LoadModule|module .* loaded|GLX)" /tmp/xorg-dummy.log | head -40 || true
            echo "--- Xorg log tail ---"
            sudo tail -150 /tmp/xorg-dummy.log
            exit 1
          fi

      - name: Install + validate (truce-vizia sub-workspace)
        env:
          DISPLAY: ':99'
          LIBGL_ALWAYS_SOFTWARE: '1'
          __GLX_VENDOR_LIBRARY_NAME: mesa
        run: |
          set -e -o pipefail
          # Confirm the GLX smoke still passes from inside *this*
          # step's env, not just the previous step's bash. If a CI
          # shim is stripping LIBGL/DISPLAY between steps, we'd see
          # zero FBConfigs here even though the gate succeeded.
          echo "--- in-step GLX smoke + env dump ---"
          env | grep -E "^(DISPLAY|LIBGL|__GLX|LD_LIBRARY_PATH|LD_PRELOAD)" || true
          /tmp/glx_smoke || {
            echo "::error::env didn't survive between Xorg-setup and validate step"
            exit 1
          }
          # Dump what pluginval is actually linked against - if it
          # bundles libGL or pins LD_LIBRARY_PATH at runtime, it
          # might bypass our Mesa vendor entirely.
          echo "--- pluginval ldd ---"
          ldd "$(command -v pluginval)" 2>&1 | grep -E "libGL|libGLX|libEGL" || true

          cd crates/truce-vizia
          "$GITHUB_WORKSPACE/target/debug/cargo-truce" install --user --clap --vst3 -p truce-example-gain-vizia
          "$GITHUB_WORKSPACE/target/debug/cargo-truce" validate --clap --pluginval -p truce-example-gain-vizia 2>&1 | tee validate-vizia.log
          if grep -E "SKIP|not found" validate-vizia.log >/dev/null; then
            echo "::error::vizia validate skipped a step — failing"
            exit 1
          fi

      - name: Package (truce-slint + truce-vizia sub-workspaces)
        run: |
          set -e -o pipefail
          cd crates/truce-slint
          "$GITHUB_WORKSPACE/target/debug/cargo-truce" package -p truce-example-gain-slint --formats clap,vst3 --no-sign --no-notarize
          cd ../truce-vizia
          "$GITHUB_WORKSPACE/target/debug/cargo-truce" package -p truce-example-gain-vizia --formats clap,vst3 --no-sign --no-notarize
