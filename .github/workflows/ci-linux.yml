name: Linux

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: ubuntu-24.04 (1.88)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-24.04

      - name: Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev \
            libgl1-mesa-dev libvulkan-dev mesa-vulkan-drivers \
            libasound2-dev libjack-jackd2-dev \
            libfontconfig1-dev libfreetype-dev

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets

      - name: test
        run: cargo test --workspace
