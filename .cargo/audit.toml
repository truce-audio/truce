# cargo-audit policy (scripts/supply-chain.sh). Mirrors the advisory
# ignores in deny.toml - cargo-audit doesn't read deny.toml, so
# vulnerability-level ignores must be repeated here (unmaintained-crate
# notices don't fail cargo-audit and need no entry).

[advisories]
# quick-xml 0.39 DoS advisories (quadratic duplicate-attribute check;
# unbounded NsReader namespace allocation). Rides in via plist <-
# cargo-truce, which never hits either affected path: plist parses with
# the plain `Reader` (no `NsReader` / `NamespaceResolver`) and never
# calls `.attributes()`. cargo-truce also only parses local,
# self-generated plists, not untrusted XML. plist 1.9.0 pins quick-xml
# ^0.39, so no upgrade exists; drop both ignores when a plist release
# moves to quick-xml >= 0.41.
ignore = ["RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]
