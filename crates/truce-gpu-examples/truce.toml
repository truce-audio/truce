# truce-gpu-examples sub-workspace project configuration.
#
# Parallels the root truce.toml. The GPU example crates live in
# their own Cargo workspace so the `truce-gui/gpu` feature can't
# leak into the parent workspace's CPU screenshot baselines via
# cargo's feature unification - see crates/truce-gpu-examples/Cargo.toml
# for the rationale. `cargo truce` invoked from inside this
# directory finds these plug-in entries instead of the parent's.
[vendor]
name = "Truce"
id = "com.truce"
url = "https://github.com/truce-audio/truce"
au_manufacturer = "Trce"

[macos.packaging]
notarize = true
welcome_html = "../../static/truce-welcome.html"

[windows.packaging]
installer_icon = "../../static/truce-minimal.ico"
welcome_bmp = "../../static/truce-welcome.bmp"

[[plugin]]
name = "Truce GUI Zoo GPU"
bundle_id = "gui-zoo-gpu"
crate = "truce-example-gui-zoo-gpu"
category = "effect"
fourcc = "TZgp"
au3_subtype = "TZgp"
au_tag = "Effects"
vst3_subcategory = "Tools"
au3_name = "Truce GUI Zoo GPU (AUv3)"
windows_icon = "../../static/truce-minimal.ico"
macos_icon = "../../static/truce-minimal.icns"
ios_icon_set = "../../static/truce-minimal.appiconset"
ios_url = "https://truce.audio/"
