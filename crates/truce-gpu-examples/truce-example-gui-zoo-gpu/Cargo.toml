[package]
name = "truce-example-gui-zoo-gpu"
# Internal-only - workspace demonstrations not for crates.io.
publish = false
version = "0.64.0"
edition = "2024"
license = "Apache-2.0 OR MIT"
rust-version = "1.92"
description = "GUI zoo plugin routed through the GPU renderer"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[[bin]]
name = "truce-example-gui-zoo-gpu-standalone"
path = "src/main.rs"
required-features = ["standalone"]

[features]
# Same layout zoo as `truce-example-gui-zoo` but routed through the
# GPU renderer (`truce-gui/gpu`) so the GPU `BuiltinEditor` path
# stays exercised by every layout the zoo demos.
default = ["clap", "vst3", "lv2", "au", "standalone-playback"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
lv2 = ["dep:truce-lv2"]
aax = ["dep:truce-aax"]
au = ["dep:truce-au"]
standalone = ["dep:truce-standalone"]
standalone-playback = ["standalone", "truce-standalone/playback"]
shell = ["truce/shell"]

[dependencies]
truce = { version = "0.64.0", path = "../../truce", default-features = false }
truce-core = { version = "0.64.0", path = "../../truce-core" }
truce-params = { version = "0.64.0", path = "../../truce-params" }
truce-clap = { version = "0.64.0", path = "../../truce-clap", optional = true }
truce-vst3 = { version = "0.64.0", path = "../../truce-vst3", optional = true }
truce-vst2 = { version = "0.64.0", path = "../../truce-vst2", optional = true }
truce-aax = { version = "0.64.0", path = "../../truce-aax", optional = true }
truce-au = { version = "0.64.0", path = "../../truce-au", optional = true }
truce-lv2 = { version = "0.64.0", path = "../../truce-lv2", optional = true }
clap-sys = { version = "0.5", optional = true }
truce-standalone = { version = "0.64.0", path = "../../truce-standalone", features = ["gui"], optional = true }
truce-gui-types = { version = "0.64.0", path = "../../truce-gui-types" }
truce-gui = { version = "0.64.0", path = "../../truce-gui", default-features = false, features = ["gpu"] }
truce-loader = { version = "0.64.0", path = "../../truce-loader" }

[dev-dependencies]
truce-test = { version = "0.64.0", path = "../../truce-test" }

[lints]
workspace = true
