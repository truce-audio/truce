[package]
name = "truce-standalone"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Standalone host wrapper for truce plugins"

[dependencies]
truce-core = { workspace = true }
truce-params = { workspace = true }
truce-driver = { workspace = true, optional = true }
cpal = "0.15"
pico-args = "0.5"
dirs = "5"
midir = "0.10"
hound = { version = "3", optional = true }

truce-gui = { workspace = true, optional = true }
truce-gpu = { workspace = true, optional = true }
baseview = { workspace = true, optional = true }
raw-window-handle = { version = "0.5", optional = true }
keyboard-types = { version = "0.6", optional = true }

# macOS native-menu bridge for `gui`-enabled standalone hosts.
# Hand-rolled `objc` runtime calls — no `cocoa` / `cacao` dep
# beyond what `objc` itself pulls in.
[target.'cfg(target_os = "macos")'.dependencies]
objc = { version = "0.2", optional = true }
# Native save / open file dialogs for the windowed runner. macOS
# only — `rfd`'s Linux backend (`xdg-portal`) drags in
# `wayland-sys`, which a typical Linux dev machine doesn't have
# installed and would force every truce-using project to apt-get
# wayland headers just to `cargo check`. Linux falls back to a
# default-path save (see `windowed.rs::pick_save_path`).
rfd = { version = "0.15", default-features = false, optional = true }

# Windows native menu bar for `gui`-enabled standalone hosts.
# Direct `windows-sys` calls — same crate already pulled in
# transitively by baseview/wgpu, so no new dep tree.
[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Shell",
], optional = true }
# Native save / open file dialogs (Windows IFileDialog).
rfd = { version = "0.15", default-features = false, optional = true }

[features]
default = []
gui = [
    "dep:truce-gui",
    "dep:truce-gpu",
    "dep:baseview",
    "dep:raw-window-handle",
    "dep:keyboard-types",
    "dep:objc",
    "dep:windows-sys",
    "dep:rfd",
]
playback = ["dep:hound", "dep:truce-driver", "truce-driver/wav"]

[lints]
workspace = true
