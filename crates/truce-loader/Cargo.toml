[package]
name = "truce-loader"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Hot-reloadable plugin logic for truce (native ABI, dylib loading)"

[dependencies]
log = "0.4"
truce-core = { workspace = true }
truce-gui = { workspace = true }
truce-params = { workspace = true }
[dependencies.libloading]
version = "0.8"
optional = true

[dependencies.parking_lot]
version = "0.12"
optional = true

[dev-dependencies]
truce = { workspace = true }
truce-params-derive = { workspace = true }

[features]
default = []
shell = ["dep:libloading", "dep:parking_lot"]
