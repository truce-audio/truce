[package]
name = "truce-xtask"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Build, bundle, and install truce audio plugins"
repository = "https://github.com/truce-audio/truce"

[dependencies]
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
truce-shim-types = { workspace = true }
truce-presets = { workspace = true }

[dependencies.libloading]
version = "0.8"
