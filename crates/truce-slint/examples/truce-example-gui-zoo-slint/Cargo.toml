[package]
name = "truce-example-gui-zoo-slint"
# Internal-only - workspace demonstrations not for crates.io.
publish = false
version = "3.1.4"
edition = "2024"
license = "Apache-2.0 OR MIT"
rust-version = "1.92"
description = "Slint GUI zoo: exercises every truce-slint widget."

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[[bin]]
name = "truce-example-gui-zoo-slint-standalone"
path = "src/main.rs"
required-features = ["standalone"]

[features]
default = ["clap", "vst3", "lv2", "au"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
lv2 = ["dep:truce-lv2"]
aax = ["dep:truce-aax"]
au = ["dep:truce-au"]
standalone = ["dep:truce-standalone"]
shell = ["truce/shell"]

[dependencies]
truce = { version = "3.1.4", path = "../../../truce", default-features = false }
truce-core = { version = "3.1.4", path = "../../../truce-core" }
truce-params = { version = "3.1.4", path = "../../../truce-params" }
truce-clap = { version = "3.1.4", path = "../../../truce-clap", optional = true }
truce-vst3 = { version = "3.1.4", path = "../../../truce-vst3", optional = true }
truce-vst2 = { version = "3.1.4", path = "../../../truce-vst2", optional = true }
truce-aax = { version = "3.1.4", path = "../../../truce-aax", optional = true }
truce-au = { version = "3.1.4", path = "../../../truce-au", optional = true }
truce-lv2 = { version = "3.1.4", path = "../../../truce-lv2", optional = true }
clap-sys = { version = "0.5", optional = true }
truce-standalone = { version = "3.1.4", path = "../../../truce-standalone", features = ["gui"], optional = true }
truce-loader = { version = "3.1.4", path = "../../../truce-loader" }
truce-slint = { version = "3.1.4", path = "../.." }
slint = { version = "=1.15.1", default-features = false, features = ["compat-1-2", "renderer-software", "std"] }

[build-dependencies]
truce-slint-build = { version = "3.1.4", path = "../../build" }

[dev-dependencies]
truce-test = { version = "3.1.4", path = "../../../truce-test" }

[lints]
workspace = true
