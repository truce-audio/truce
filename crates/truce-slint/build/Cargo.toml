[package]
name = "truce-slint-build"
version = "0.53.0"
edition = "2024"
license = "Apache-2.0 OR MIT"
rust-version = "1.92"
description = "Build-script helper for truce plugins with Slint GUIs. Bundles the truce widget library and JetBrains Mono so authors get a one-line build.rs."
repository = "https://github.com/truce-audio/truce"
homepage = "https://github.com/truce-audio/truce"

# Ship the bundled widget sources so the published crate works
# out-of-tree. JetBrains Mono comes in via `truce-font` rather than
# being duplicated under `fonts/` here - single source of truth for
# the TTF + OFL license text.
include = [
    "src/**",
    "ui/*.slint",
    "README.md",
]

[dependencies]
slint-build = "=1.15.1"
truce-font = { version = "0.53.0", path = "../../truce-font" }

[lints]
workspace = true
