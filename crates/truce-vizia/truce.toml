# truce-vizia sub-workspace project configuration.
#
# Parallels the root truce.toml. The vizia example crates live in
# their own Cargo workspace (vizia's hard-pinned baseview rev would
# otherwise pull a broken iOS path + an inert [patch] into the
# parent's Cargo.lock - see crates/truce-vizia/Cargo.toml), so
# `cargo truce` invoked from inside this directory finds these
# plugin entries instead of the parent's. Vendor / packaging
# metadata is duplicated here because cargo-truce reads it from
# whichever truce.toml the project_root walk finds.
[vendor]
name = "Truce"
id = "com.truce"
url = "https://github.com/truce-audio/truce"
au_manufacturer = "Trce"

[macos.packaging]
notarize = true
welcome_html = "../../static/truce-welcome.html"

[windows.packaging]
installer_icon = "../../static/truce-minimal.ico"
welcome_bmp = "../../static/truce-welcome.bmp"

[[plugin]]
name = "Truce Gain Vizia"
bundle_id = "gain-vizia"
crate = "truce-example-gain-vizia"
category = "effect"
fourcc = "TGvz"
au3_subtype = "TGv3"
au_tag = "Effects"
aax_category = "Dynamics"
au3_name = "Truce Gain Vizia (AUv3)"
windows_icon = "../../static/truce-minimal.ico"
macos_icon = "../../static/truce-minimal.icns"

[[plugin]]
name = "Truce GUI Zoo (vizia)"
bundle_id = "gui-zoo-vizia"
crate = "truce-example-gui-zoo-vizia"
category = "effect"
fourcc = "TZvz"
au3_subtype = "TZv3"
au_tag = "Effects"
au3_name = "Truce GUI Zoo vizia (AUv3)"
windows_icon = "../../static/truce-minimal.ico"
macos_icon = "../../static/truce-minimal.icns"
