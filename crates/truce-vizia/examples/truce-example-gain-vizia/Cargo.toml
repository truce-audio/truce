[package]
name = "truce-example-gain-vizia"
publish = false
version = "0.61.0"
edition = "2024"
license = "Apache-2.0 OR MIT"
rust-version = "1.92"
description = "Vizia gain example for truce."

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[[bin]]
name = "truce-example-gain-vizia-standalone"
path = "src/main.rs"
required-features = ["standalone"]

[features]
default = ["clap", "vst3", "lv2", "au"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
lv2 = ["dep:truce-lv2"]
aax = ["dep:truce-aax"]
au = ["dep:truce-au"]
standalone = ["dep:truce-standalone"]
shell = ["truce/shell"]

[dependencies]
truce = { version = "0.61.0", path = "../../../truce", default-features = false }
truce-core = { version = "0.61.0", path = "../../../truce-core" }
truce-params = { version = "0.61.0", path = "../../../truce-params" }
truce-clap = { version = "0.61.0", path = "../../../truce-clap", optional = true }
truce-vst3 = { version = "0.61.0", path = "../../../truce-vst3", optional = true }
truce-vst2 = { version = "0.61.0", path = "../../../truce-vst2", optional = true }
truce-aax = { version = "0.61.0", path = "../../../truce-aax", optional = true }
truce-au = { version = "0.61.0", path = "../../../truce-au", optional = true }
truce-lv2 = { version = "0.61.0", path = "../../../truce-lv2", optional = true }
clap-sys = { version = "0.5", optional = true }
truce-standalone = { version = "0.61.0", path = "../../../truce-standalone", features = ["gui"], optional = true }
truce-font = { version = "0.61.0", path = "../../../truce-font" }
truce-loader = { version = "0.61.0", path = "../../../truce-loader" }
truce-vizia = { version = "0.61.0", path = "../.." }

[dev-dependencies]
truce-test = { version = "0.61.0", path = "../../../truce-test" }

[lints]
workspace = true
