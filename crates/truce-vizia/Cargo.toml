# truce-vizia lives in its own Cargo workspace, parallel to
# truce-slint. The split exists because vizia hard-pins
# `https://github.com/vizia/baseview.git` at a specific rev, and the
# workspace-level `[patch]` that should redirect it to
# `baseview-truce` is silently inert (cargo doesn't apply registry
# patches whose package name doesn't match the consumer's requested
# name - vizia asks for `baseview`, our published fork is
# `baseview-truce`). Isolating vizia here keeps the parent
# Cargo.lock and the parent `[patch]` table from being contaminated
# by vizia's pin.
#
# Path deps point back into the parent workspace (`../<crate>`).
# `cargo publish` strips `path` and embeds the registry `version`,
# so the explicit `version = "..."` pins are load-bearing for
# publish. `scripts/release/bump.sh` sweeps this file alongside the
# parent workspace.
[workspace]
members = [
    ".",
    "examples/truce-example-gain-vizia",
    "examples/truce-example-gui-zoo-vizia",
]
resolver = "3"

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("cargo-clippy"))'] }

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }

# Redirect vizia_baseview's hard-pinned baseview rev through the
# truce-audio/baseview fork so vizia plugins inherit the AAX /
# Pro Tools teardown fix every other GUI backend already gets.
#
# The fork has two branches: `master` is published to crates.io as
# `baseview-truce` (the `[lib].name = "baseview"` workaround lets
# direct consumers `use baseview::*`), and the branch pinned below
# carries the same source but with `[package].name = "baseview"` so
# cargo's `[patch]` package-name matching applies the substitution
# (cargo refuses cross-name registry patches - only when the patched
# package name matches the consumer's requested name does the
# substitution land). The branch isn't published to crates.io
# because that name is taken.
[patch."https://github.com/vizia/baseview.git"]
baseview = { git = "https://github.com/truce-audio/baseview.git", branch = "baseview-truce-vizia" }

# vizia_core 0.4.0's Context::modify_timer has a real infinite-loop bug
# (vizia/vizia#530, fix PR vizia/vizia#749, not yet merged upstream at time
# of writing): the search loop only ever peeks the running_timers min-heap's
# top entry and never advances past a non-matching one, so a timer that
# isn't currently the top-of-heap entry spins the UI thread forever - no
# blocking wait involved, so it doesn't present as a hung/waiting thread.
# Two timers running at once are enough to trigger it, and vizia_core
# itself always registers one (Environment::caret_timer, started on any
# Textbox focus-in) - so any truce-vizia plugin with both a Textbox and its
# own meter-refresh timer (started right after the plugin's editor setup
# closure returns, see ViziaEditor::open) can hit this reliably. Redirect
# to the fix branch on our fork until the upstream PR lands; swap this for
# the real upstream rev (or drop it entirely) once #749 merges.
[patch."https://github.com/vizia/vizia.git"]
vizia_core = { git = "https://github.com/lxndrbe/vizia.git", branch = "fix/modify-timer-at-24c4743" }

[package]
name = "truce-vizia"
version = "2.0.1"
edition = "2024"
license = "Apache-2.0 OR MIT"
rust-version = "1.92"
description = "Vizia-based GUI backend for truce audio plugins."
repository = "https://github.com/truce-audio/truce"
homepage = "https://github.com/truce-audio/truce"

[lib]
crate-type = ["rlib"]

[dependencies]
truce-core = { version = "2.0.1", path = "../truce-core" }
truce-params = { version = "2.0.1", path = "../truce-params" }
truce-font = { version = "2.0.1", path = "../truce-font" }
# Pulled in only for `reanchor_all_children_to_top` (macOS NSView
# anchoring helper). Doesn't drag in any renderer.
truce-gui-utils = { version = "2.0.1", path = "../truce-gui-utils" }

# vizia 0.4.0 on crates.io ships the winit backend only; the
# `baseview` feature (and the vizia_baseview crate) live in vizia's
# main branch but aren't in the published umbrella. Pin to a
# specific main-branch rev for reproducibility. See the workspace
# `[patch]` block above for the (currently inert) baseview redirect.
vizia = { git = "https://github.com/vizia/vizia.git", rev = "24c47433098fcc8e29668a22fcb71771807d86d6", default-features = false, features = ["baseview"] }
# raw-window-handle 0.5 matches what baseview-truce + vizia_baseview
# expose publicly. The platform.rs newtype bridges truce-core's own
# `RawWindowHandle` enum to rwh's `HasRawWindowHandle` trait.
raw-window-handle = "0.5"
log = "0.4"
# `skia-safe` is *not* declared here. vizia_core re-exports it as
# `vizia::vg`; pulling it in twice (once directly here, once through
# vizia) makes cargo emit two copies of the `skia-bindings` native
# archive into the example crate's `staticlib`, which then trips
# `clang -bundle`'s duplicate-symbol detector on every harfbuzz /
# OpenType object (`hb_parse_double`, `_hb_ot_var_normalize_coords`,
# ...). The screenshot path consumes the re-export.

[lints]
workspace = true
