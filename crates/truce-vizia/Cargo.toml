[package]
name = "truce-vizia"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Vizia GUI backend for truce audio plugins"

[dependencies]
truce-core = { workspace = true }

vizia = { git = "https://github.com/vizia/vizia.git", rev = "2346f355", default-features = false, features = ["baseview", "clipboard"] }
baseview = { git = "https://github.com/vizia/baseview.git", rev = "77fec022db136fb771d5775ae13d088f4f166c04", features = ["opengl"] }
raw-window-handle = "0.5"
png = "0.18"

[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.24"
objc = "0.2"
