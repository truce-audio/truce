[package]
name = "truce"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Audio plugin framework — write once, build VST3, CLAP, AU, AAX"

[dependencies]
truce-core = { workspace = true }
truce-params = { workspace = true }
truce-params-derive = { workspace = true }
truce-loader = { workspace = true }
truce-derive = { workspace = true }

[features]
# CLAP is the only default format. VST3, VST2, AU, AAX are all opt-in.
# VST2 in particular is a legacy format — the Steinberg VST2 SDK was
# deprecated in 2018 and VST2 plugin distribution may require agreement
# with Steinberg's licensing terms. Enable only if you understand the
# implications.
default = ["clap"]
clap = ["dep:truce-clap"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
lv2 = ["dep:truce-lv2"]
hot-reload = ["truce-loader/shell"]
hot-debug = ["truce-loader/hot-debug"]

[dependencies.truce-clap]
workspace = true
optional = true

[dependencies.truce-vst3]
workspace = true
optional = true

[dependencies.truce-vst2]
workspace = true
optional = true

[dependencies.truce-lv2]
workspace = true
optional = true
