[package]
name = "truce-example-gui-zoo-iced"
# Internal-only - workspace demonstrations not for crates.io.
publish = false
version.workspace = true
repository.workspace = true
homepage.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[[bin]]
name = "truce-example-gui-zoo-iced-standalone"
path = "src/main.rs"
required-features = ["standalone"]

[features]
default = ["clap", "vst3", "lv2", "au"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
lv2 = ["dep:truce-lv2"]
aax = ["dep:truce-aax"]
au = ["dep:truce-au"]
standalone = ["dep:truce-standalone"]
shell = ["truce/shell"]

[dependencies]
truce = { workspace = true }
truce-core = { workspace = true }
truce-params = { workspace = true }
truce-clap = { workspace = true, optional = true }
truce-vst3 = { workspace = true, optional = true }
truce-vst2 = { workspace = true, optional = true }
truce-aax = { workspace = true, optional = true }
truce-au = { workspace = true, optional = true }
truce-lv2 = { workspace = true, optional = true }
clap-sys = { version = "0.5", optional = true }
truce-standalone = { workspace = true, features = ["gui"], optional = true }
truce-font = { workspace = true }
truce-loader = { workspace = true }

# `iced_winit` doesn't compile for iOS (winit's `KeyEvent` API drift
# inside a non-wasm cfg block). Like `truce-example-gain-iced`, the
# whole crate is `#[cfg(not(target_os = "ios"))]`-gated to a stub on
# iOS; the dep list matches.
[target.'cfg(not(target_os = "ios"))'.dependencies]
truce-iced = { workspace = true }
# `image` feature for the image-widget demo (the carrot.gif).
iced = { version = "0.14", default-features = false, features = ["image"] }
# Decode the embedded carrot.gif into raw RGBA for `image::Handle::from_rgba`.
gif = "0.13"

[dev-dependencies]
truce-test = { workspace = true }

[lints]
workspace = true
