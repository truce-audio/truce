[package]
name = "truce-example-fundsp-reverb-worker"
# Internal-only - workspace demonstrations not for crates.io.
publish = false
version.workspace = true
repository.workspace = true
homepage.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[[bin]]
name = "truce-example-fundsp-reverb-worker-standalone"
path = "src/main.rs"
required-features = ["standalone"]

[features]
default = ["clap", "vst3", "lv2", "au", "aax"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
lv2 = ["dep:truce-lv2"]
aax = ["dep:truce-aax"]
au = ["dep:truce-au"]
standalone = ["dep:truce-standalone"]
shell = ["truce/shell"]
# Real-time allocation checking for the tests (dev/test only).
rt-paranoid = ["truce/rt-paranoid"]

[dependencies]
truce = { workspace = true }
truce-core = { workspace = true }
truce-params = { workspace = true }
truce-clap = { workspace = true, optional = true }
truce-vst3 = { workspace = true, optional = true }
truce-vst2 = { workspace = true, optional = true }
truce-aax = { workspace = true, optional = true }
truce-au = { workspace = true, optional = true }
truce-lv2 = { workspace = true, optional = true }
clap-sys = { version = "0.5", optional = true }
truce-standalone = { workspace = true, features = ["gui"], optional = true }
truce-gui-types = { workspace = true }
truce-gui = { workspace = true, features = ["cpu"] }
truce-loader = { workspace = true }
# fundsp 0.23's main prelude runs every node in f32 - matches truce's
# default `prelude` import, no widen/narrow on the audio boundary.
# Pinned to a minor version because fundsp moves combinator surface
# (e.g. `hacker` module dropped between 0.22 and 0.23) on every release.
fundsp = "0.23"
# Lock-free bounded queues for handing graphs between the audio
# thread and the rebuild worker without locks or allocation.
crossbeam-queue = "0.3"

[dev-dependencies]
truce-test = { workspace = true }

[lints]
workspace = true
