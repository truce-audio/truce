[package]
name = "truce-example-gain-slint"
version.workspace = true
repository.workspace = true
homepage.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Example gain plugin with Slint GUI"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "truce-example-gain-slint-standalone"
path = "src/main.rs"
required-features = ["standalone"]

[features]
default = ["clap", "vst3", "lv2", "au", "aax"]
clap = ["dep:truce-clap", "dep:clap-sys"]
vst3 = ["dep:truce-vst3"]
vst2 = ["dep:truce-vst2"]
lv2 = ["dep:truce-lv2"]
aax = ["dep:truce-aax"]
au = ["dep:truce-au"]
standalone = ["dep:truce-standalone"]
shell = ["truce/shell"]

[dependencies]
truce = { workspace = true }
truce-core = { workspace = true }
truce-params = { workspace = true }
truce-clap = { workspace = true, optional = true }
truce-vst3 = { workspace = true, optional = true }
truce-vst2 = { workspace = true, optional = true }
truce-aax = { workspace = true, optional = true }
truce-au = { workspace = true, optional = true }
clap-sys = { version = "0.5", optional = true }
truce-standalone = { workspace = true, features = ["gui"], optional = true }
truce-gui = { workspace = true }
truce-loader = { workspace = true }
truce-slint = { workspace = true }
slint = { version = "=1.15.1", default-features = false, features = ["compat-1-2", "renderer-software", "std"] }

truce-lv2 = { workspace = true, optional = true }

[build-dependencies]
truce-slint-build = { workspace = true }

[dev-dependencies]
truce-test = { workspace = true }

[lints]
workspace = true
