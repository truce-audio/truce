[workspace]
resolver = "2"
members = [
    "crates/truce",
    "crates/truce-core",
    "crates/truce-params",
    "crates/truce-params-derive",
    "crates/truce-clap",
    "crates/truce-vst3",
    "crates/truce-au",
    "crates/truce-standalone",
    "crates/truce-gui",
    "crates/truce-vst2",
    "crates/truce-lv2",
    "crates/truce-aax",
    "crates/truce-test",
    "crates/truce-build",
    "examples/gain",
    "examples/synth",
    "examples/eq",
    "examples/transpose",
    "examples/arpeggio",
    "examples/gain-egui",
    "examples/tremolo",
    "xtask",
    "crates/truce-loader",
    "crates/truce-derive",
    "crates/truce-xtask",
    "crates/cargo-truce",
    "crates/truce-gpu",
    "crates/truce-egui",
    "crates/truce-iced",
    "examples/gain-iced",
    "crates/truce-slint",
    "examples/gain-slint",
    "crates/truce-shim-types",
    "crates/truce-dsp",
]

[workspace.package]
version = "0.5.0"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.75"
description = "Build audio plugins in Rust. One codebase, every format."
repository = "https://github.com/truce-audio/truce"
homepage = "https://github.com/truce-audio/truce"
categories = ["multimedia::audio", "development-tools::cargo-plugins"]
keywords = ["audio", "plugin", "vst", "clap", "daw", "aax", "sfx", "effects", "cubase", "protools", "ableton"]
readme = "README.md"

# Workspace-wide lint config. Crates opt in with `lints.workspace = true`.
# `objc` 0.2's `msg_send!` / `class!` / `sel!` macros emit
# `#[cfg(feature = "cargo-clippy")]` checks against the destination crate;
# whitelist that cfg value so the unexpected_cfgs lint stops complaining
# about an upstream macro-hygiene issue.
[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("cargo-clippy"))'] }

[workspace.dependencies]
truce = { version = "0.5.0", path = "crates/truce" }
truce-core = { version = "0.5.0", path = "crates/truce-core" }
truce-params = { version = "0.5.0", path = "crates/truce-params" }
truce-params-derive = { version = "0.5.0", path = "crates/truce-params-derive" }
truce-clap = { version = "0.5.0", path = "crates/truce-clap" }
truce-vst3 = { version = "0.5.0", path = "crates/truce-vst3" }
truce-au = { version = "0.5.0", path = "crates/truce-au" }
truce-standalone = { version = "0.5.0", path = "crates/truce-standalone" }
truce-gui = { version = "0.5.0", path = "crates/truce-gui" }
truce-vst2 = { version = "0.5.0", path = "crates/truce-vst2" }
truce-lv2 = { version = "0.5.0", path = "crates/truce-lv2" }
truce-aax = { version = "0.5.0", path = "crates/truce-aax" }
truce-test = { version = "0.5.0", path = "crates/truce-test" }
truce-build = { version = "0.5.0", path = "crates/truce-build" }
truce-loader = { version = "0.5.0", path = "crates/truce-loader" }
truce-derive = { version = "0.5.0", path = "crates/truce-derive" }
truce-gpu = { version = "0.5.0", path = "crates/truce-gpu" }
truce-egui = { version = "0.5.0", path = "crates/truce-egui" }
truce-iced = { version = "0.5.0", path = "crates/truce-iced" }
truce-slint = { version = "0.5.0", path = "crates/truce-slint" }
truce-shim-types = { version = "0.5.0", path = "crates/truce-shim-types" }
truce-dsp = { version = "0.5.0", path = "crates/truce-dsp" }

# Use the truce-audio baseview fork for the AAX / Pro Tools close-path
# fix (responder / tracking-area / layer-contents cleanup — see the
# fork's docs/pro-tools-aax-fix.md). The regular workspace deps below
# still reference `RustAudio/baseview`; Cargo's [patch] redirects them
# to the fork.
[patch."https://github.com/RustAudio/baseview.git"]
baseview = { git = "https://github.com/truce-audio/baseview.git" }
