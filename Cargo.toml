[workspace]
resolver = "2"
members = [
    "crates/truce",
    "crates/truce-core",
    "crates/truce-params",
    "crates/truce-params-derive",
    "crates/truce-clap",
    "crates/truce-vst3",
    "crates/truce-au",
    "crates/truce-standalone",
    "crates/truce-gui",
    "crates/truce-vst2",
    "crates/truce-aax",
    "crates/truce-test",
    "crates/truce-build",
    "examples/gain",
    "examples/synth",
    "examples/eq",
    "examples/transpose",
    "examples/arpeggio",
    "crates/truce-egui/examples/gain-egui",
    "xtask",
    "crates/truce-loader",
    "crates/truce-derive",
    "crates/truce-xtask",
    "crates/cargo-truce",
    "crates/truce-gpu",
    "crates/truce-egui",
    "crates/truce-iced",
    "crates/truce-iced/examples/gain-iced",
    "crates/truce-vizia",
    "crates/truce-vizia/examples/gain-vizia",
    "crates/truce-shim-types",
]

[workspace.package]
version = "0.1.3"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.75"
description = "Build audio plugins in Rust. One codebase, every format."
repository = "https://github.com/truce-audio/truce"
homepage = "https://github.com/truce-audio/truce"
categories = ["multimedia::audio", "development-tools::cargo-plugins"]
keywords = ["audio", "plugin", "vst", "clap", "daw", "aax", "sfx", "effects", "cubase", "protools", "ableton"]
readme = "README.md"

[workspace.dependencies]
truce = { version = "0.1.3", path = "crates/truce" }
truce-core = { version = "0.1.3", path = "crates/truce-core" }
truce-params = { version = "0.1.3", path = "crates/truce-params" }
truce-params-derive = { version = "0.1.3", path = "crates/truce-params-derive" }
truce-clap = { version = "0.1.3", path = "crates/truce-clap" }
truce-vst3 = { version = "0.1.3", path = "crates/truce-vst3" }
truce-au = { version = "0.1.3", path = "crates/truce-au" }
truce-standalone = { version = "0.1.3", path = "crates/truce-standalone" }
truce-gui = { version = "0.1.3", path = "crates/truce-gui" }
truce-vst2 = { version = "0.1.3", path = "crates/truce-vst2" }
truce-aax = { version = "0.1.3", path = "crates/truce-aax" }
truce-test = { version = "0.1.3", path = "crates/truce-test" }
truce-build = { version = "0.1.3", path = "crates/truce-build" }
truce-loader = { version = "0.1.3", path = "crates/truce-loader" }
truce-derive = { version = "0.1.3", path = "crates/truce-derive" }
truce-gpu = { version = "0.1.3", path = "crates/truce-gpu" }
truce-egui = { version = "0.1.3", path = "crates/truce-egui" }
truce-iced = { version = "0.1.3", path = "crates/truce-iced" }
truce-vizia = { version = "0.1.3", path = "crates/truce-vizia" }
truce-shim-types = { version = "0.1.3", path = "crates/truce-shim-types" }
