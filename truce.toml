au_tag = "MIDI"
# See note on transpose above re: AAX MIDI category override.
au3_name = "Truce SysEx Echo (AUv3)"
windows_icon = "static/truce-minimal.ico"
macos_icon = "static/truce-minimal.icns"
ios_icon_set = "static/truce-minimal.appiconset"

[[plugin]]
name = "Truce Hyper Synth"
bundle_id = "hyper-synth"
crate = "truce-example-hyper-synth"
# Instrument (MIDI in, audio out). `midi2 = true` makes the host deliver
# native MIDI 2.0; two input ports let a downstream router feed voices on
# port 0 and per-note control on port 1.
category = "instrument"
midi2 = true
midi_input_ports = 2
fourcc = "THyp"
au3_subtype = "THy3"
au_tag = "Synthesizer"
vst3_subcategory = "Instrument|Synth"
au3_name = "Truce Hyper Synth (AUv3)"
windows_icon = "static/truce-minimal.ico"
macos_icon = "static/truce-minimal.icns"
ios_icon_set = "static/truce-minimal.appiconset"

[[plugin]]
name = "Truce MIDI Inspector"
bundle_id = "midi-inspector"
crate = "truce-example-midi-inspector"
# Audio effect with a stereo passthrough that also monitors + forwards
# MIDI (AU `aumf` MusicEffect). The audio I/O lets it load as an insert
# in hosts that don't host MIDI-only plug-ins (Ableton, Reaper); a pure
# MIDI processor (`category = "midi"` -> `aumi`) is invisible there.
category = "effect"
midi_input = true
midi_output = true
# Opt into MIDI 2.0 so the host delivers native 2.0 (NoteOn2, PerNoteCC,
# ...) for the inspector to display at full resolution.
midi2 = true
fourcc = "TMin"
au3_subtype = "TMi3"
au_tag = "Effects"
vst3_subcategory = "Tools"
au3_name = "Truce MIDI Inspector (AUv3)"
windows_icon = "static/truce-minimal.ico"
macos_icon = "static/truce-minimal.icns"
ios_icon_set = "static/truce-minimal.appiconset"

# Suite installer wrapping every example above. `cargo truce package`
# (no flags) produces both per-plugin installers and this suite installer.
# Pass `--no-per-plugin` for suite-only output, `--no-suite` to drop it.
# Omitting `plugins` / `exclude_plugins` includes every `[[plugin]]`
# defined above; omitting `formats` falls back to each plugin's declared
# default features.
[[suite]]
name = "Truce Examples"
bundle_id = "truce-examples"

# Small two-plugin subset for exercising a subset install without
# packaging every example.
[[suite]]
name = "Truce Examples Subset"
bundle_id = "truce-examples-subset"
plugins = ["synth", "gain-egui-aspect"]

