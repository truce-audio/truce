[[plugin]]
name = "Truce Channel Spread"
bundle_id = "chan-spread"
crate = "truce-example-mpe-spreader"
category = "midi"
# Promotes 1.0 -> 2.0 and fans notes across channels / ports. The second
# output port carries the Port Fan split and the Auto Vibrato / Mod
# Brightness per-note expression.
midi2 = true
midi_output_ports = 2
fourcc = "TMpe"
au3_subtype = "TMp3"
au_tag = "MIDI"
# See note on transpose above re: AAX MIDI category override.
au3_name = "Truce Channel Spread (AUv3)"
windows_icon = "static/truce-minimal.ico"
macos_icon = "static/truce-minimal.icns"
ios_icon_set = "static/truce-minimal.appiconset"

