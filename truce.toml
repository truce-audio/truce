# truce plugin project configuration
#
# This file is tracked. It carries project-level facts only: vendor info,
# plugin definitions, suite definitions, packaging metadata.
#
# Per-developer build environment (signing identities, AAX SDK path,
# notarization Apple ID / team ID, Authenticode certs) lives in the
# local `.cargo/config.toml` (gitignored), not here. See
# https://truce.audio/ for the complete list of env vars truce reads.
#
#   # .cargo/config.toml
#   [env]
#   TRUCE_SIGNING_IDENTITY = "Developer ID Application: Name (TEAMID)"
#   AAX_SDK_PATH           = "/path/to/aax-sdk-2-9-0"
[vendor]
name = "Truce"
id = "com.truce"
url = "https://github.com/truce-audio/truce"
au_manufacturer = "Trce"

# Notarizing can be enabled after creating a TRUCE_NOTARY:
#   xcrun notarytool store-credentials TRUCE_NOTARY
#
[macos.packaging]
notarize = true
welcome_html = "static/truce-welcome.html"

[windows.packaging]
installer_icon = "static/truce-minimal.ico"
welcome_bmp = "static/truce-welcome.bmp"

# Each [[plugin]] entry defines a plugin to build and install.
# The crate must support --features au (or whichever formats you declare).
# `cargo truce new <name>` scaffolds a new plugin under plugins/<name>/;
# the first-party examples in this repo live under examples/ for
# historical reasons.
#
# Per-format display-name overrides (all optional) let a plugin show
# under a different name in specific host browsers. Useful mostly
# when AU v2 and v3 are installed side-by-side, or during beta/alpha
# parallel ships. When a field is absent the format falls back to
# `name` above.
#
#   clap_name = "..."
#   vst3_name = "..."
#   vst2_name = "..."
#   au_name   = "..."
#   au3_name  = "..."
#   aax_name  = "..."
#   lv2_name  = "..."
#
# Per-plugin iOS overrides:
#
#   ios_icon_set            = ".appiconset directory"
#   ios_minimum_os_version  = "16.0"
#   ios_url                 = "https://example.com/this-plugin"
#                             # iOS container "About" link-out;
#                             # falls back to [vendor].url
#   ios_orientations        = ["portrait", "landscape-left",
#                              "landscape-right"]
#                             # First entry is the launch orientation.
#                             # Default if unset: above three.
#                             # In landscape, the container chrome
#                             # (title, status, Play button) hides
#                             # behind a hamburger overlay top-right
#                             # so the editor fills the screen.
#   ios_scale_editor_to_fit = false
#                             # Opt out of the default shrink-to-fit
#                             # of an oversize editor into the
#                             # container's hero region. Default
#                             # `true`; never up-scales above 1.0.
#                             # Set `false` for plug-ins whose editor
#                             # is already iPhone-sized.

