# truce plugin project configuration
#
# Per-developer build environment (signing, SDK paths) lives in the local
# `.cargo/config.toml` (gitignored), not here — this file is tracked.
#
#   [env]
#   TRUCE_SIGNING_IDENTITY = "Developer ID Application: Name (TEAMID)"
#   AAX_SDK_PATH           = "/path/to/aax-sdk-2-9-0"
#
# Either env var also works if set in your shell.
[vendor]
name = "Truce"
id = "com.truce"
url = "https://github.com/truce-audio/truce"
au_manufacturer = "Trce"

# Each [[plugin]] entry defines a plugin to build and install.
# The crate must exist at examples/<suffix>/ and support --features au.

[[plugin]]
name = "Truce Gain"
suffix = "gain"
crate = "truce-example-gain"
category = "effect"
fourcc = "TGan"
au3_subtype = "TGn3"
au_tag = "Effects"
aax_category = "Dynamics"

[[plugin]]
name = "Truce Synth"
suffix = "synth"
crate = "truce-example-synth"
category = "instrument"
fourcc = "TSyn"
au3_subtype = "TSn3"
au_tag = "Synthesizer"

[[plugin]]
name = "Truce EQ"
suffix = "eq"
crate = "truce-example-eq"
category = "effect"
fourcc = "TEq3"
au3_subtype = "TEq4"
au_tag = "EQ"
aax_category = "EQ"

[[plugin]]
name = "Truce Transpose"
suffix = "transpose"
crate = "truce-example-transpose"
category = "midi"
fourcc = "TTrn"
au3_subtype = "TTr3"
au_tag = "MIDI"
aax_category = "EQ"

[[plugin]]
name = "Truce Gain Egui"
suffix = "gain-egui"
crate = "truce-example-gain-egui"
category = "effect"
fourcc = "TGeg"
au3_subtype = "TGe3"
au_tag = "Effects"
aax_category = "Dynamics"

[[plugin]]
name = "Truce Arpeggio"
suffix = "arpeggio"
crate = "truce-example-arpeggio"
category = "midi"
fourcc = "TArp"
au3_subtype = "TAr3"
au_tag = "MIDI"
aax_category = "EQ"

[[plugin]]
name = "Truce Gain Iced"
suffix = "gain-iced"
crate = "truce-example-gain-iced"
category = "effect"
fourcc = "TGic"
au3_subtype = "TGi3"
au_tag = "Effects"
aax_category = "Dynamics"

[[plugin]]
name = "Truce Gain Slint"
suffix = "gain-slint"
crate = "gain-slint"
category = "effect"
fourcc = "TGsl"
au3_subtype = "TGs3"
au_tag = "Effects"
aax_category = "Dynamics"

