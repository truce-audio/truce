# cargo-deny policy for the main workspace and the truce-slint /
# truce-gpu-examples sub-workspaces, applied via `cargo deny check
# --config <this file>` (see scripts/supply-chain.sh). The truce-vizia
# sub-workspace uses its own crates/truce-vizia/deny.toml because it is
# the only workspace pulling git-sourced deps - keeping the git
# allowance out of here bounds its blast radius to that one workspace.
# cargo-deny has no config inheritance, so vizia's file repeats the
# license/advisory policy below.

[advisories]
# Unmaintained transitive crate with no published vulnerability. Not a
# first-party dependency - resolves only when an upstream proc-macro dep
# bumps. Tracked here so a *new* advisory still fails the gate.
ignore = [
    "RUSTSEC-2024-0436", # paste - unmaintained (proc-macro, deep transitive)
]

[licenses]
# Union of every license encountered across these workspaces. A given
# workspace only sees a subset, so don't warn on allow entries it never
# hits.
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "OFL-1.1",         # epaint_default_fonts embeds OFL fonts (AND clause)
    "Ubuntu-font-1.0", # epaint_default_fonts embeds the Ubuntu font (AND clause)
    # slint is tri-licensed (GPL-3.0 OR royalty-free OR commercial); we
    # consume it under the royalty-free terms, so GPL-3.0 stays out.
    "LicenseRef-Slint-Royalty-free-2.0",
]

[bans]
# Duplicate crate versions are unavoidable in a wide GUI/host tree
# (windows-* generations, hashbrown, thiserror, tiny-skia, ...). Surface
# them without failing the gate.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
# No git-sourced deps in these workspaces; any git source is unexpected.
# The truce-vizia workspace, which does pull git forks, allow-lists them
# in its own deny.toml.
unknown-git = "deny"
